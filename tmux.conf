# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color support
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0             # no delay after prefix (fixes vi-mode lag)
set -g focus-events on
set -g renumber-windows on
set -g base-index 1               # windows/panes start at 1, matches keyboard order
setw -g pane-base-index 1
set -g set-clipboard on

# --- Prefix ---
# Ctrl-a is easier to reach than the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Splits (keep current path, mnemonic keys) ---
unbind '"'
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation: vim-style ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode: vi keys, sensible yank ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Status bar ---
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-left "#[bold] #S "
set -g status-right "#[fg=colour245]%Y-%m-%d %H:%M"
setw -g window-status-current-format "#[bold] #I:#W "
setw -g window-status-format " #I:#W "

# --- Panes ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

# --- Plugins (installed/updated with prefix + I, via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore last saved session when tmux server starts; save every 15 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Keep tpm init as the last line
run '~/.tmux/plugins/tpm/tpm'
